# ╔═══════════════════════════════════════════════════╗
# ║           tmux.conf — Nordbones                   ║
# ╚═══════════════════════════════════════════════════╝

# ── Terminal ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix ────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── Splits ────────────────────────────────────────────
unbind %
bind s split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# ── Reload config ─────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"

# ── Pane navigation (vim-style) ───────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── Session CWD attachment ────────────────────────────
bind M-c attach-session -c "#{pane_current_path}"

# ── Mouse & vi-mode ───────────────────────────────────
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Misc ──────────────────────────────────────────────
set -sg escape-time 10
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on

# ══ Nordbones Palette ════════════════════════════════
# bg        #2E3440  (Nord0  — deep arctic night)
# bg_dim    #3B4252  (Nord1  — raised surface)
# bg_mid    #434C5E  (Nord2  — overlay / borders)
# fg        #D8DEE9  (Nord4  — primary text)
# fg_dim    #9399A5  (Nord3↑ — dimmed text)
# blue      #81A1C1  (Nord9  — accent blue)
# cyan      #88C0D0  (Nord8  — bright cyan / active)
# green     #A3BE8C  (Nord14 — strings / uptime)
# yellow    #EBCB8B  (Nord13 — warnings / activity)
# purple    #B48EAD  (Nord15 — special / current win)
# ═════════════════════════════════════════════════════

# ── Status bar position ───────────────────────────────
set -g status-position top

# ── Status bar base ───────────────────────────────────
set -g status-style "bg=#2E3440,fg=#D8DEE9"
set -g status-left-length 60
set -g status-right-length 120

# ── Left: session + pane ──────────────────────────────
set -g status-left "\
#[bg=#81A1C1,fg=#2E3440,bold]  #S \
#[bg=#3B4252,fg=#81A1C1]  \
#[bg=#3B4252,fg=#9399A5] 󰙀 #I:#P \
#[bg=#2E3440,fg=#3B4252] "

# ── Right: path + uptime + time + date ───────────────
set -g status-right "\
#[bg=#2E3440,fg=#3B4252]\
#[bg=#3B4252,fg=#9399A5] 󰉋 #{b:pane_current_path} \
#[bg=#3B4252,fg=#434C5E]│\
#[bg=#3B4252,fg=#A3BE8C] 󰔟 #{uptime} \
#[bg=#3B4252,fg=#81A1C1]\
#[bg=#81A1C1,fg=#2E3440,bold] 󰥔 %H:%M \
#[bg=#81A1C1,fg=#3B4252]\
#[bg=#3B4252,fg=#D8DEE9] 󰃮 %a %d %b \
#[bg=#2E3440,fg=#3B4252]"

# ── Window list ───────────────────────────────────────
set -g status-justify left

# inactive
set -g window-status-format "\
#[bg=#2E3440,fg=#434C5E] \
#[bg=#434C5E,fg=#9399A5,bold] #I \
#[bg=#434C5E,fg=#9399A5] #W \
#[bg=#2E3440,fg=#434C5E] "

# active
set -g window-status-current-format "\
#[bg=#2E3440,fg=#B48EAD]\
#[bg=#B48EAD,fg=#2E3440,bold] #I \
#[bg=#3B4252,fg=#D8DEE9,bold] #W#{?window_zoomed_flag, 󰍉,} \
#[bg=#2E3440,fg=#3B4252]"

set -g window-status-activity-style "bg=#434C5E,fg=#EBCB8B,bold"

# ── Pane borders ──────────────────────────────────────
set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#88C0D0"
set -g pane-border-lines single

# ── Misc UI ───────────────────────────────────────────
set -g display-panes-colour "#434C5E"
set -g display-panes-active-colour "#81A1C1"
set -g message-style "bg=#3B4252,fg=#EBCB8B,bold"
set -g message-command-style "bg=#3B4252,fg=#81A1C1,bold"
set -g mode-style "bg=#434C5E,fg=#D8DEE9"
set -g clock-mode-colour "#81A1C1"
set -g clock-mode-style 24

# ── Plugins ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Init TPM (keep at bottom) ─────────────────────────
run '~/.tmux/plugins/tpm/tpm'
