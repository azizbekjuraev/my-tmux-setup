# ╔═══════════════════════════════════════════════════╗
# ║           tmux.conf — Everforest Dark             ║
# ╚═══════════════════════════════════════════════════╝

# ── Terminal ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix ────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── Splits ────────────────────────────────────────────
unbind %
bind s split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# ── Reload config ─────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"

# ── Pane navigation (vim-style) ───────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── Session CWD attachment ────────────────────────────
bind M-c attach-session -c "#{pane_current_path}"

# ── Mouse & vi-mode ───────────────────────────────────
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Misc ──────────────────────────────────────────────
set -sg escape-time 10
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on

# ══ Everforest Palette (dark) ════════════════════════
# bg        #2D353B  (hard dark background)
# bg_dim    #232A2E  (dimmed background)
# bg_mid    #3D484D  (raised surface / borders)
# bg_hl     #374145  (highlighted background)
# fg        #D3C6AA  (primary foreground)
# fg_dim    #7A8478  (dimmed / comments)
# red       #E67E80  (errors / alerts)
# orange    #E69875  (warnings / numbers)
# yellow    #DBBC7F  (warnings / activity)
# green     #A7C080  (strings / uptime / active)
# aqua      #83C092  (functions / accent)
# blue      #7FBBB3  (keywords / accent blue)
# purple    #D699B6  (special / current win)
# ═════════════════════════════════════════════════════

# ── Status bar position ───────────────────────────────
set -g status-position top

# ── Status bar base ───────────────────────────────────
set -g status-style "bg=#2D353B,fg=#D3C6AA"
set -g status-left-length 60
set -g status-right-length 120

# ── Left: session + pane ──────────────────────────────
set -g status-left "\
#[bg=#A7C080,fg=#2D353B,bold]  #S \
#[bg=#374145,fg=#A7C080]  \
#[bg=#374145,fg=#7A8478] 󰙀 #I:#P \
#[bg=#2D353B,fg=#374145] "

# ── Right: path + uptime + time + date ───────────────
set -g status-right "\
#[bg=#2D353B,fg=#374145]\
#[bg=#374145,fg=#7A8478] 󰉋 #{b:pane_current_path} \
#[bg=#2D353B,fg=#374145]"

# ── Window list ───────────────────────────────────────
set -g status-justify left

# inactive
set -g window-status-format "\
#[bg=#2D353B,fg=#3D484D] \
#[bg=#3D484D,fg=#7A8478,bold] #I \
#[bg=#3D484D,fg=#7A8478] #W \
#[bg=#2D353B,fg=#3D484D] "

# active
set -g window-status-current-format "\
#[bg=#2D353B,fg=#D699B6]\
#[bg=#D699B6,fg=#2D353B,bold] #I \
#[bg=#374145,fg=#D3C6AA,bold] #W#{?window_zoomed_flag, 󰍉,} \
#[bg=#2D353B,fg=#374145]"

set -g window-status-activity-style "bg=#3D484D,fg=#DBBC7F,bold"

# ── Pane borders ──────────────────────────────────────
set -g pane-border-style "fg=#374145"
set -g pane-active-border-style "fg=#83C092"
set -g pane-border-lines single

# ── Misc UI ───────────────────────────────────────────
set -g display-panes-colour "#3D484D"
set -g display-panes-active-colour "#7FBBB3"
set -g message-style "bg=#374145,fg=#DBBC7F,bold"
set -g message-command-style "bg=#374145,fg=#7FBBB3,bold"
set -g mode-style "bg=#3D484D,fg=#D3C6AA"
set -g clock-mode-colour "#7FBBB3"
set -g clock-mode-style 24

# ── Plugins ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Init TPM (keep at bottom) ─────────────────────────
run '~/.tmux/plugins/tpm/tpm'
