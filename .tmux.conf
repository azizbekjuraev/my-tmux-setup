# ╔═══════════════════════════════════════════════════╗
# ║           tmux.conf — Zenwritten                  ║
# ╚═══════════════════════════════════════════════════╝

# ── Terminal ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix ────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── Splits ────────────────────────────────────────────
unbind %
bind s split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# ── Reload config ─────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "  Config reloaded!"

# ── Pane navigation (vim-style) ───────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── Session CWD attachment ────────────────────────────
bind M-c attach-session -c "#{pane_current_path}"

# ── Mouse & vi-mode ───────────────────────────────────
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Misc ──────────────────────────────────────────────
set -sg escape-time 10
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on

# ══ Zenwritten Palette (dark) ════════════════════════
# bg        #16161D  (deep ink)
# bg_dim    #1C1C24  (raised surface)
# bg_mid    #2E2E36  (overlay / borders)
# fg        #BBBBBB  (primary text)
# fg_dim    #757575  (dimmed text / comments)
# red       #C3777E  (errors / red accent)
# green     #859289  (strings / uptime)
# yellow    #C4A78B  (warnings / activity)
# blue      #7E9DA1  (functions / accent blue)
# cyan      #89A39C  (bright cyan / active)
# purple    #A89EAB  (special / current win)
# ═════════════════════════════════════════════════════

# ── Status bar position ───────────────────────────────
set -g status-position top

# ── Status bar base ───────────────────────────────────
set -g status-style "bg=#16161D,fg=#BBBBBB"
set -g status-left-length 60
set -g status-right-length 120

# ── Left: session + pane ──────────────────────────────
set -g status-left "\
#[bg=#7E9DA1,fg=#16161D,bold]  #S \
#[bg=#1C1C24,fg=#7E9DA1]  \
#[bg=#1C1C24,fg=#757575] 󰙀 #I:#P \
#[bg=#16161D,fg=#1C1C24] "

# ── Right: path + uptime + time + date ───────────────
set -g status-right "\
#[bg=#16161D,fg=#1C1C24]\
#[bg=#1C1C24,fg=#757575] 󰉋 #{b:pane_current_path} \
#[bg=#1C1C24,fg=#2E2E36]│\
#[bg=#1C1C24,fg=#859289] 󰔟 #{uptime} \
#[bg=#1C1C24,fg=#7E9DA1]\
#[bg=#7E9DA1,fg=#16161D,bold] 󰥔 %H:%M \
#[bg=#7E9DA1,fg=#1C1C24]\
#[bg=#1C1C24,fg=#BBBBBB] 󰃮 %a %d %b \
#[bg=#16161D,fg=#1C1C24]"

# ── Window list ───────────────────────────────────────
set -g status-justify left

# inactive
set -g window-status-format "\
#[bg=#16161D,fg=#2E2E36] \
#[bg=#2E2E36,fg=#757575,bold] #I \
#[bg=#2E2E36,fg=#757575] #W \
#[bg=#16161D,fg=#2E2E36] "

# active
set -g window-status-current-format "\
#[bg=#16161D,fg=#A89EAB]\
#[bg=#A89EAB,fg=#16161D,bold] #I \
#[bg=#1C1C24,fg=#BBBBBB,bold] #W#{?window_zoomed_flag, 󰍉,} \
#[bg=#16161D,fg=#1C1C24]"

set -g window-status-activity-style "bg=#2E2E36,fg=#C4A78B,bold"

# ── Pane borders ──────────────────────────────────────
set -g pane-border-style "fg=#1C1C24"
set -g pane-active-border-style "fg=#89A39C"
set -g pane-border-lines single

# ── Misc UI ───────────────────────────────────────────
set -g display-panes-colour "#2E2E36"
set -g display-panes-active-colour "#7E9DA1"
set -g message-style "bg=#1C1C24,fg=#C4A78B,bold"
set -g message-command-style "bg=#1C1C24,fg=#7E9DA1,bold"
set -g mode-style "bg=#2E2E36,fg=#BBBBBB"
set -g clock-mode-colour "#7E9DA1"
set -g clock-mode-style 24

# ── Plugins ───────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Init TPM (keep at bottom) ─────────────────────────
run '~/.tmux/plugins/tpm/tpm'
